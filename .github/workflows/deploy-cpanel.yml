name: Deploy to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cpanel-framekit-deploy
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.13"
  REMOTE_PATH: /home/ismails1/framekit
  REMOTE_DATA_PATH: /home/ismails1/framekit-data

jobs:
  deploy:
    name: Test and deploy
    runs-on: ubuntu-latest

    env:
      CPANEL_SSH_HOST: ${{ secrets.CPANEL_SSH_HOST }}
      CPANEL_SSH_USER: ${{ secrets.CPANEL_SSH_USER }}
      CPANEL_SSH_PORT: ${{ secrets.CPANEL_SSH_PORT || '22' }}
      CPANEL_SSH_PRIVATE_KEY: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}
      CPANEL_SSH_KNOWN_HOSTS: ${{ secrets.CPANEL_SSH_KNOWN_HOSTS }}
      CPANEL_VENV_PATH: ${{ secrets.CPANEL_VENV_PATH }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

      - name: Validate deployment secrets
        run: |
          set -euo pipefail

          missing=0
          for name in CPANEL_SSH_HOST CPANEL_SSH_USER CPANEL_SSH_PRIVATE_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required GitHub secret: ${name}"
              missing=1
            fi
          done

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Prepare SSH
        run: |
          set -euo pipefail

          install -m 700 -d ~/.ssh
          printf '%s\n' "${CPANEL_SSH_PRIVATE_KEY}" > ~/.ssh/cpanel_deploy_key
          chmod 600 ~/.ssh/cpanel_deploy_key

          if [ -n "${CPANEL_SSH_KNOWN_HOSTS}" ]; then
            printf '%s\n' "${CPANEL_SSH_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${CPANEL_SSH_PORT}" "${CPANEL_SSH_HOST}" >> ~/.ssh/known_hosts
          fi

      - name: Check SSH connection
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/cpanel_deploy_key -p "${CPANEL_SSH_PORT}" \
            "${CPANEL_SSH_USER}@${CPANEL_SSH_HOST}" \
            "whoami && pwd"

      - name: Ensure remote app directory exists
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/cpanel_deploy_key -p "${CPANEL_SSH_PORT}" \
            "${CPANEL_SSH_USER}@${CPANEL_SSH_HOST}" \
            "mkdir -p '${REMOTE_PATH}' '${REMOTE_DATA_PATH}' && test -d '${REMOTE_PATH}' && test -d '${REMOTE_DATA_PATH}'"

      - name: Sync code to cPanel
        run: |
          set -euo pipefail

          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.htaccess' \
            --exclude '.venv/' \
            --exclude 'venv/' \
            --exclude 'env/' \
            --exclude '__pycache__/' \
            --exclude '.pytest_cache/' \
            --exclude '.ruff_cache/' \
            --exclude '.mypy_cache/' \
            --exclude '*.pyc' \
            --exclude '*.pyo' \
            --exclude '*.log' \
            --exclude '.DS_Store' \
            --exclude 'input/' \
            --exclude 'output/' \
            --exclude 'data/' \
            --exclude 'assets/fonts/' \
            -e "ssh -i ~/.ssh/cpanel_deploy_key -p ${CPANEL_SSH_PORT}" \
            ./ "${CPANEL_SSH_USER}@${CPANEL_SSH_HOST}:${REMOTE_PATH}/"

      - name: Sync bundled presets and assets to runtime data
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/cpanel_deploy_key -p "${CPANEL_SSH_PORT}" \
            "${CPANEL_SSH_USER}@${CPANEL_SSH_HOST}" \
            "mkdir -p '${REMOTE_DATA_PATH}/presets' '${REMOTE_DATA_PATH}/assets/logos' '${REMOTE_DATA_PATH}/assets/fonts' '${REMOTE_DATA_PATH}/assets/vignettes' '${REMOTE_DATA_PATH}/assets/overlays' '${REMOTE_PATH}/data/presets' '${REMOTE_PATH}/data/assets/logos' '${REMOTE_PATH}/data/assets/fonts' '${REMOTE_PATH}/data/assets/vignettes' '${REMOTE_PATH}/data/assets/overlays'"

          for target in "${REMOTE_DATA_PATH}" "${REMOTE_PATH}/data"; do
            rsync -az \
              -e "ssh -i ~/.ssh/cpanel_deploy_key -p ${CPANEL_SSH_PORT}" \
              data/presets/ "${CPANEL_SSH_USER}@${CPANEL_SSH_HOST}:${target}/presets/"

            rsync -az \
              -e "ssh -i ~/.ssh/cpanel_deploy_key -p ${CPANEL_SSH_PORT}" \
              data/assets/logos/ "${CPANEL_SSH_USER}@${CPANEL_SSH_HOST}:${target}/assets/logos/"

            rsync -az \
              -e "ssh -i ~/.ssh/cpanel_deploy_key -p ${CPANEL_SSH_PORT}" \
              data/assets/fonts/ "${CPANEL_SSH_USER}@${CPANEL_SSH_HOST}:${target}/assets/fonts/"

            rsync -az \
              -e "ssh -i ~/.ssh/cpanel_deploy_key -p ${CPANEL_SSH_PORT}" \
              data/assets/vignettes/ "${CPANEL_SSH_USER}@${CPANEL_SSH_HOST}:${target}/assets/vignettes/"

            rsync -az \
              -e "ssh -i ~/.ssh/cpanel_deploy_key -p ${CPANEL_SSH_PORT}" \
              data/assets/overlays/ "${CPANEL_SSH_USER}@${CPANEL_SSH_HOST}:${target}/assets/overlays/"
          done

      - name: Verify Passenger entrypoint
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/cpanel_deploy_key -p "${CPANEL_SSH_PORT}" \
            "${CPANEL_SSH_USER}@${CPANEL_SSH_HOST}" \
            "grep -q 'from web_app.app import app as application' '${REMOTE_PATH}/passenger_wsgi.py'"

      - name: Install on cPanel and restart Passenger
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/cpanel_deploy_key -p "${CPANEL_SSH_PORT}" \
            "${CPANEL_SSH_USER}@${CPANEL_SSH_HOST}" \
            "CPANEL_VENV_PATH='${CPANEL_VENV_PATH}' REMOTE_DATA_PATH='${REMOTE_DATA_PATH}' REMOTE_PATH='${REMOTE_PATH}' bash -s" <<'REMOTE'
          set -euo pipefail

          cd "${REMOTE_PATH}"

          mkdir -p \
            "${REMOTE_DATA_PATH}/presets" \
            "${REMOTE_DATA_PATH}/assets/logos" \
            "${REMOTE_DATA_PATH}/assets/fonts" \
            "${REMOTE_DATA_PATH}/assets/vignettes" \
            "${REMOTE_DATA_PATH}/assets/overlays" \
            "${REMOTE_DATA_PATH}/projects" \
            "${REMOTE_DATA_PATH}/carousels" \
            "${REMOTE_DATA_PATH}/temp"

          REMOTE_PYTHON=""
          try_python() {
            if [ -z "${REMOTE_PYTHON}" ] && [ -x "$1" ]; then
              REMOTE_PYTHON="$1"
            fi
          }

          if [ -n "${CPANEL_VENV_PATH}" ]; then
            try_python "${CPANEL_VENV_PATH}/bin/python"
          fi

          for candidate in \
            "${HOME}/virtualenv/$(basename "${REMOTE_PATH}")"/*/bin/python \
            "${HOME}/virtualenv/framekit"/*/bin/python \
            "${HOME}/virtualenv"/*/*/bin/python; do
            try_python "${candidate}"
          done

          if [ -z "${REMOTE_PYTHON}" ]; then
            echo "Could not find the cPanel Python virtualenv."
            echo "Set CPANEL_VENV_PATH to the app virtualenv path, for example: ${HOME}/virtualenv/framekit/3.13"
            exit 1
          fi

          echo "Using cPanel Python: ${REMOTE_PYTHON}"
          "${REMOTE_PYTHON}" -m pip install --upgrade pip
          "${REMOTE_PYTHON}" -m pip install -e .
          "${REMOTE_PYTHON}" - <<'PY'
          from pathlib import Path
          from tempfile import TemporaryDirectory

          from PIL import Image
          import pillow_heif

          from frameedit.image_ops import open_oriented_image

          print(f"Verified pillow-heif {pillow_heif.__version__}")
          print(f"Verified frameedit source {Path(open_oriented_image.__code__.co_filename).resolve()}")

          with TemporaryDirectory() as temp_dir:
              source = Path(temp_dir) / "probe.heic"
              Image.new("RGB", (3, 4), "red").save(source, format="PNG")
              image = open_oriented_image(source)
              assert image.size == (3, 4)
          PY

          mkdir -p tmp
          touch tmp/restart.txt
          REMOTE
