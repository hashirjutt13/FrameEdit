{% extends "base.html" %}
{% block title %}All In One Edit{% endblock %}
{% block content %}
<section class="panel">
  <div class="split-head">
    <div>
      <h1>All In One Edit</h1>
    </div>
    <a class="button ghost" href="{{ url_for('recent_projects') }}">Previous Work</a>
  </div>
  <form action="{{ url_for('all_in_one_preview') }}" method="post" enctype="multipart/form-data" class="grid-form" data-loading-message="Uploading and preparing previews. Large HEIC files can take a minute.">
    <label>
      Brand preset
      <select name="preset_slug">
        {% for preset in presets %}
          <option value="{{ preset.slug }}">{{ preset.name }}</option>
        {% endfor %}
      </select>
    </label>
    <label>
      Product name
      <input name="product_name" required placeholder="ECLAT CONSOLE">
    </label>
    <label>
      Category name
      <input name="category_name" required placeholder="Consoles">
    </label>
    <label class="wide">
      Product photos
      <input type="file" name="images" multiple required accept=".jpg,.jpeg,.png,.webp,.heic,.heif">
    </label>
    <button type="submit" data-loading-text="Preparing preview...">Preview Batch</button>
  </form>
</section>
{% endblock %}
