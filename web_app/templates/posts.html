{% extends "base.html" %}
{% block title %}Posts Edit{% endblock %}
{% block content %}
<section class="panel">
  <h1>Posts Edit</h1>
  <form action="{{ url_for('posts_preview') }}" method="post" enctype="multipart/form-data" class="grid-form" data-loading-message="Uploading and preparing post previews.">
    <label>
      Brand preset
      <select name="preset_slug">
        {% for preset in presets %}
          <option value="{{ preset.slug }}">{{ preset.name }}</option>
        {% endfor %}
      </select>
    </label>
    <label>
      Batch name
      <input name="product_name" placeholder="Optional, used for filenames">
    </label>
    <label class="wide">
      Post photos
      <input type="file" name="images" multiple required accept=".jpg,.jpeg,.png,.webp,.heic,.heif">
    </label>
    <button type="submit" data-loading-text="Preparing preview...">Preview Posts</button>
  </form>
</section>
{% endblock %}
